<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Alumni</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">
  <div class="card shadow-lg p-4">

    <h3 class="text-center mb-4">Form Data Alumni</h3>

    <form id="formData">

      <input class="form-control mb-3" name="nama" placeholder="Nama Lengkap" required>

      <select id="kabupaten" name="kabupaten" class="form-control mb-3" required>
        <option value="">Pilih Kabupaten</option>
      </select>

      <select id="kecamatan" name="kecamatan" class="form-control mb-3" required>
        <option value="">Pilih Kecamatan</option>
      </select>

      <select id="desa" name="desa" class="form-control mb-3" required>
        <option value="">Pilih Desa</option>
      </select>

      <select id="tamat" name="tamat" class="form-control mb-3" required>
        <option value="">Apakah Tamat?</option>
        <option value="Ya">Ya</option>
        <option value="Tidak">Tidak</option>
      </select>

      <input id="tahunTamat" name="tahun_tamat" type="number" class="form-control mb-3 d-none" placeholder="Tahun Tamat">

      <input name="tahun_boyong" type="number" class="form-control mb-3" placeholder="Tahun Boyong" required>

      <input name="wa" class="form-control mb-3" placeholder="No WhatsApp" required>

      <button class="btn btn-primary w-100">Kirim Data</button>

    </form>

    <div id="status" class="mt-3"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
