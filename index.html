<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Alumni</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">
  <div class="card premium-card shadow-lg p-4">

    <h3 class="text-center mb-4 fw-bold">Form Data Alumni</h3>

    <!-- Loading -->
    <div id="loading" class="text-center mb-3">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2">Memuat data wilayah...</p>
    </div>

    <form id="formData">

      <div class="mb-3">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" name="nama" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Kabupaten</label>
        <select id="kabupaten" name="kabupaten" class="form-control" required>
          <option value="">Pilih Kabupaten</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Kecamatan</label>
        <select id="kecamatan" name="kecamatan" class="form-control" required>
          <option value="">Pilih Kecamatan</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Desa</label>
        <select id="desa" name="desa" class="form-control" required>
          <option value="">Pilih Desa</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Apakah Tamat?</label>
        <select id="tamat" name="tamat" class="form-control" required>
          <option value="">Pilih</option>
          <option value="Ya">Ya</option>
          <option value="Tidak">Tidak</option>
        </select>
      </div>

      <div class="mb-3 d-none" id="tahunTamatWrap">
        <label class="form-label">Tahun Tamat</label>
        <input type="number" class="form-control" name="tahun_tamat">
      </div>

      <div class="mb-3">
        <label class="form-label">Tahun Boyong</label>
        <input type="number" class="form-control" name="tahun_boyong" required>
      </div>

      <div class="mb-3">
        <label class="form-label">No WhatsApp</label>
        <input type="text" class="form-control" name="wa" required>
      </div>

      <button class="btn btn-primary w-100 btn-premium">Kirim Data</button>

    </form>

    <div id="status" class="mt-3"></div>

  </div>
</div>

<!-- MODAL SUCCESS -->
<div class="modal fade" id="successModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">

      <h3 class="fw-bold text-success">Berhasil 🎉</h3>

      <p class="mt-3">
        Data Anda sudah tersimpan.<br>
        Jika Anda belum masuk grup alumni, silakan bergabung.
      </p>

      <a href="https://chat.whatsapp.com/LINK_GRUP_KAMU" target="_blank" class="btn btn-success w-100 mb-2">
        Gabung Grup WhatsApp
      </a>

      <button class="btn btn-outline-secondary w-100" data-bs-dismiss="modal">
        Tutup
      </button>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
